<div class="card m-4">
    <div class="card-body">
      <div class="row">
        <!-- Lewa kolumna (Formularz rejestracji) -->
        <div class="col-md-4">
          <!-- Nagłówek formularza rejestracji -->
          <div class="card mb-4">
            <div class="card-header">
              <h3 class="h5 mb-0">Rejestracja użytkownika</h3>
            </div>
            <div class="card-body">
              <form (ngSubmit)="onSubmit()" [formGroup]="rejestracja">
                <div class="form-group">
                  <label for="firstName">Imię</label>
                  <input type="text" id="firstName" class="form-control form-control-sm" formControlName="firstName" required>
                </div>
  
                <div class="form-group">
                  <label for="lastName">Nazwisko</label>
                  <input type="text" id="lastName" class="form-control form-control-sm" formControlName="lastName" required>
                </div>
  
                <div class="form-group">
                  <label for="email">E-mail</label>
                  <input type="email" id="email" class="form-control form-control-sm" formControlName="email" required>
                </div>
  
                <div class="form-group">
                  <label for="password">Hasło</label>
                  <input type="password" id="password" class="form-control form-control-sm" formControlName="password" required>
                </div>
  
                <div class="form-group">
                  <label for="confirmPassword">Powtórz hasło</label>
                  <input type="password" id="confirmPassword" class="form-control form-control-sm" formControlName="confirmPassword" required>
                </div>
  
                <div class="form-group">
                  <label for="age">Wiek</label>
                  <input type="number" id="age" class="form-control form-control-sm" formControlName="age" required>
                </div>
  
                <div class="form-group form-check">
                  <input type="checkbox" id="terms" class="form-check-input" formControlName="terms" required>
                  <label class="form-check-label" for="terms">Wyrażam zgodę na przetwarzanie danych osobowych</label>
                </div>
  
                <div class="form-group">
                  <label for="jobPosition">Stanowisko</label>
                  <select id="jobPosition" class="form-control form-control-sm" formControlName="jobPosition">
                    <option value="kierownik">Kierownik</option>
                    <option value="kierowca">Kierowca</option>
                    <option value="ksiegowa">Księgowa</option>
                    <option value="pracownik_fizyczny">Pracownik fizyczny</option>
                  </select>
                </div>
  
                <div class="form-group">
                  <label for="photo">Zdjęcie</label>
                  <input type="file" id="photo" class="form-control form-control-sm" formControlName="photo" (change)="onFileChange($event)">
                  <!-- Wyświetlanie miniaturki zdjęcia, jeśli zostało wybrane -->
                  <div *ngIf="photoPreview" class="mt-2">
                    <img [src]="photoPreview" alt="Zdjęcie" class="img-thumbnail" style="max-width: 100px;">
                  </div>
                </div>
  
                <button type="submit" class="btn btn-primary btn-sm mt-3" [disabled]="rejestracja.invalid">Dodaj użytkownika</button>
              </form>
            </div>
          </div>
        </div>
  
        <!-- Prawa kolumna (Lista pracowników) -->
        <div class="col-md-8">
          <!-- Nagłówek karty -->
          <div class="card mb-4">
            <div class="card-header">
              <h3 class="h5 mb-0">Lista pracowników</h3>
            </div>
            <div class="card-body">
              <table class="table table-striped table-sm">
                <thead>
                  <tr>
                    <th>Imię</th>
                    <th>Nazwisko</th>
                    <th>Stanowisko</th>
                    <th>Zdjęcie</th>
                    <th>Wiek</th>
                    <th>Akcja</th>
                  </tr>
                </thead>
                <tbody>
                  <tr *ngFor="let employee of employees">
                    <td>{{ employee.firstName }}</td>
                    <td>{{ employee.lastName }}</td>
                    <td>{{ employee.jobPosition }}</td>
                    <td> {{ employee.age }} </td>
                    <td>
                      <!-- Wyświetlanie miniaturki zdjęcia w tabeli -->
                      <img *ngIf="employee.photo" [src]="employee.photo" alt="Zdjęcie" class="img-thumbnail" style="max-width: 50px;">
                    </td>
                    <td>
                      <button class="btn btn-danger btn-sm" (click)="deleteEmployee(employee)">Usuń</button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
