<div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header bg-primary text-white">
            <h2 class="text-center">Kalkulator Koła i Kuli</h2>
          </div>
          <div class="card-body">
            <form (ngSubmit)="calculateCircle()" #circleForm="ngForm">
              <div class="mb-3">
                <label for="radius" class="form-label">Promień (cm)</label>
                <input
                  type="number"
                  class="form-control"
                  id="radius"
                  [(ngModel)]="radius"
                  name="radius"
                  required
                  min="0.1"
                  max="1000"
                />
              </div>
              <button
                type="submit"
                class="btn btn-primary w-100"
                [disabled]="!circleForm.form.valid"
              >
                Oblicz
              </button>
            </form>
  
            <div *ngIf="area !== null || volume !== null" class="mt-4 text-center">
              <h3>Wyniki</h3>
              <p class="h4">
                Pole kuli: <strong>{{ area | number:'1.2-2' }} cm²</strong>
              </p>
              <p class="h4">
                Objętość kuli: <strong>{{ volume | number:'1.2-2' }} cm³</strong>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
